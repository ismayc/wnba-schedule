name: Refresh data

# The app ships a committed snapshot of the season, so it renders instantly with no
# requests — but that snapshot goes stale the moment a game finishes. This keeps it
# current: twice daily it re-fetches, and on any change it tests, commits to main, and
# redeploys the site — all in this one job. The test run is the gate, so a bad refresh
# fails here instead of shipping.
#
# Early morning UTC (after every West-coast game has finished) and mid-afternoon UTC
# (catches afternoon tips and schedule changes).

on:
  schedule:
    - cron: '15 9 * * *'
    - cron: '15 19 * * *'
  workflow_dispatch:

permissions:
  contents: write # commit the refreshed data to main
  pages: write # deploy the rebuilt site
  id-token: write # OIDC for actions/deploy-pages

# Share the Pages concurrency group with CI so a refresh deploy and a push deploy never
# overlap — but never cancel a deploy midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # No deps needed to fetch — the script uses Node built-ins only.
      - name: Regenerate schedule, players, and logos
        run: node scripts/fetch-schedule.mjs --season 2026

      - name: Summarize what changed
        id: diff
        run: |
          if git diff --quiet -- src/data public/logos; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Data refresh"
              echo '```'
              git diff --stat -- src/data public/logos
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # The gate: standings are derived from the committed scores, so a bad refresh fails
      # a test here rather than shipping a wrong-looking table.
      - name: Install and test against the refreshed data
        if: steps.diff.outputs.changed == 'true'
        run: |
          npm ci
          npm test

      # Commit straight to main (the test above is the gate). This push is authored by
      # GITHUB_TOKEN, so it does NOT trigger the CI deploy — this workflow deploys itself
      # in the job below instead.
      - name: Commit the refreshed data to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- src/data public/logos
          git commit -m "Refresh schedule, results, and player stats from ESPN"
          git push

      - name: Build the site
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Upload the Pages artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  # Publishes the artifact the refresh job built — only when there was a change.
  deploy:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
