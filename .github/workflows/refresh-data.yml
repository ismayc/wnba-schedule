name: Refresh data

# The app ships a committed snapshot of the season, so it renders instantly with no
# requests — but that snapshot goes stale the moment a game finishes. This keeps it
# current.
#
# Twice daily: early morning UTC (after every West-coast game has finished) and
# mid-afternoon UTC (catches afternoon tips and schedule changes).

on:
  schedule:
    - cron: '15 9 * * *'
    - cron: '15 19 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # No npm ci — the fetch script uses Node built-ins only, which keeps this job
      # fast and immune to a broken lockfile.
      - name: Regenerate schedule, players, and logos
        run: node scripts/fetch-schedule.mjs --season 2026

      - name: Summarize what changed
        id: diff
        run: |
          if git diff --quiet -- src/data public/logos; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Data refresh"
              echo '```'
              git diff --stat -- src/data public/logos
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # Tests run against the committed data, so a refresh that breaks them must not
      # merge. This is the whole reason the refresh goes through a PR rather than
      # pushing straight to main.
      - name: Install and test against the refreshed data
        if: steps.diff.outputs.changed == 'true'
        run: |
          npm ci
          npm test

      - name: Open a pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: data/refresh
          base: main
          title: 'Refresh season data'
          commit-message: 'Refresh schedule, results, and player stats from ESPN'
          body: |
            Automated refresh of the committed season snapshot.

            Regenerated by `scripts/fetch-schedule.mjs`. The test suite ran against
            the new data before this PR was opened — standings are derived from the
            committed scores, so a bad refresh shows up as a failing test rather than
            a wrong-looking table.
          delete-branch: true
